<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <style>
    .dim { stroke-dasharray: 360; stroke-dashoffset: 360; animation: dimDraw 12s ease-out infinite; }
    .live { animation: livePulse 12s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }

    @keyframes dimDraw {
      0% { stroke-dashoffset: 360; }
      28%, 88% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: 360; }
    }
    @keyframes livePulse {
      0%, 60%, 100% { opacity: 0.85; }
      70% { opacity: 0.25; }
    }
  </style>
  <defs>
    <!-- Cyanotype paper: subtle vertical fall-off so the top reads slightly
         lighter than the bottom, like sun-bleached print. -->
    <linearGradient id="bp-paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0e3a6e" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#0e3a6e" stop-opacity="1"/>
    </linearGradient>
    <!-- Light grid (every 20px). Faint enough to read as paper texture and
         not compete with foreground text. -->
    <pattern id="bp-grid" x="24" y="24" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#7d9fc4" stroke-width="0.5" stroke-opacity="0.22"/>
    </pattern>
    <!-- Heavier grid every 100px (every 5 cells) for a "section line" feel. -->
    <pattern id="bp-grid-major" x="24" y="24" width="100" height="100" patternUnits="userSpaceOnUse">
      <path d="M 100 0 L 0 0 0 100" fill="none" stroke="#7d9fc4" stroke-width="0.75" stroke-opacity="0.32"/>
    </pattern>
  </defs>

  <!-- Paper -->
  <rect width="100%" height="100%" fill="url(#bp-paper)" rx="4" ry="4"/>

  <!-- Grid (clipped to inside the sheet border) -->
  <rect x="24" y="24" width="752" height="252" fill="url(#bp-grid)"/>
  <rect x="24" y="24" width="752" height="252" fill="url(#bp-grid-major)"/>

  <!-- Sheet border + corner registration marks -->
  <rect x="24" y="24" width="752" height="252" fill="none" stroke="#f1ece1" stroke-width="1" stroke-opacity="0.7"/>
  <g>
    <line x1="19" y1="24" x2="29" y2="24" stroke="#f1ece1" stroke-width="1"/>
    <line x1="24" y1="19" x2="24" y2="29" stroke="#f1ece1" stroke-width="1"/>
  </g>
  <g>
    <line x1="771" y1="24" x2="781" y2="24" stroke="#f1ece1" stroke-width="1"/>
    <line x1="776" y1="19" x2="776" y2="29" stroke="#f1ece1" stroke-width="1"/>
  </g>
  <g>
    <line x1="19" y1="276" x2="29" y2="276" stroke="#f1ece1" stroke-width="1"/>
    <line x1="24" y1="271" x2="24" y2="281" stroke="#f1ece1" stroke-width="1"/>
  </g>
  <g>
    <line x1="771" y1="276" x2="781" y2="276" stroke="#f1ece1" stroke-width="1"/>
    <line x1="776" y1="271" x2="776" y2="281" stroke="#f1ece1" stroke-width="1"/>
  </g>

  <!-- Top strip: figure label + sheet count + 'live' indicator -->
  <text x="36" y="40" fill="#7d9fc4" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">FIG. 01    PROFILE</text>
  <g transform="translate(764 36)">
    <text text-anchor="end" fill="#7d9fc4" font-family="ui-monospace, monospace" font-size="10" letter-spacing="2">SHEET 01 / 05</text>
    <circle class="live" cx="6" cy="-3" r="2" fill="#ffffff" opacity="0.85"/>
  </g>
  <!-- Hairline divider under the top strip -->
  <line x1="32" y1="48" x2="768" y2="48" stroke="#7d9fc4" stroke-width="0.75" stroke-opacity="0.4"/>

  <!-- Dimension annotation above the name (W = NN) -->
  <g class="dim">
    <!-- Extension lines descending from the dimension line toward the name -->
    <line x1="181" y1="90" x2="181" y2="96" stroke="#ffffff" stroke-width="1"/>
    <line x1="619" y1="90" x2="619" y2="96" stroke="#ffffff" stroke-width="1"/>
    <!-- Dimension line itself -->
    <line x1="169" y1="84" x2="631" y2="84" stroke="#ffffff" stroke-width="1"/>
  </g>
  <!-- Arrow heads (filled triangles, NOT inside .dim so they don't dasharray-blink) -->
  <path d="M 165 84 l 5 -3 l 0 6 Z" fill="#ffffff"/>
  <path d="M 635 84 l -5 -3 l 0 6 Z" fill="#ffffff"/>
  <!-- Dimension value text (breaks the dimension line) -->
  <rect x="362" y="76" width="76" height="16" fill="#0e3a6e"/>
  <text x="400" y="88" text-anchor="middle" fill="#ffffff" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1.5">L = 12</text>

  <!-- Hero name: tracked-out uppercase caps -->
  <text x="400" y="152" text-anchor="middle" fill="#f1ece1" font-family='"Inter", system-ui, sans-serif' font-size="50" font-weight="800" letter-spacing="6">RYAN POLASKY</text>
  <!-- Baseline rule (extends past the name on both sides) -->
  <line x1="165" y1="158" x2="635" y2="158" stroke="#f1ece1" stroke-width="1" stroke-opacity="0.85"/>

  <!-- Numbered callouts row (role / org / location) -->
  <g>
      <circle cx="165" cy="196" r="9" fill="none" stroke="#ffffff" stroke-width="1.25"/>
      <text x="165" y="199" text-anchor="middle" fill="#ffffff" font-family="ui-monospace, monospace" font-size="10" font-weight="700">1</text>
      <text x="182" y="200" fill="#f1ece1" font-family="ui-monospace, monospace" font-size="12" letter-spacing="1.2">SOFTWARE ENGINEER</text>
    </g>
  <g>
      <circle cx="364.6" cy="196" r="9" fill="none" stroke="#ffffff" stroke-width="1.25"/>
      <text x="364.6" y="199" text-anchor="middle" fill="#ffffff" font-family="ui-monospace, monospace" font-size="10" font-weight="700">2</text>
      <text x="381.6" y="200" fill="#f1ece1" font-family="ui-monospace, monospace" font-size="12" letter-spacing="1.2">UT DALLAS &apos;26</text>
    </g>
  <g>
      <circle cx="530.6" cy="196" r="9" fill="none" stroke="#ffffff" stroke-width="1.25"/>
      <text x="530.6" y="199" text-anchor="middle" fill="#ffffff" font-family="ui-monospace, monospace" font-size="10" font-weight="700">3</text>
      <text x="547.6" y="200" fill="#f1ece1" font-family="ui-monospace, monospace" font-size="12" letter-spacing="1.2">DALLAS, TX</text>
    </g>

  <!-- Bottom title block (5 cells: DRAWN BY / DATE / SCALE / REV / SHEET) -->
  <g>
    <rect x="24" y="236" width="150" height="40" fill="none" stroke="#7d9fc4" stroke-width="1" stroke-opacity="0.55"/>
    <text x="32" y="248" fill="#7d9fc4" font-family="ui-monospace, monospace" font-size="8" letter-spacing="1.2">DRAWN BY</text>
    <text x="32" y="268" fill="#f1ece1" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1">R.P.</text>
  </g>
  <g>
    <rect x="174" y="236" width="150" height="40" fill="none" stroke="#7d9fc4" stroke-width="1" stroke-opacity="0.55"/>
    <text x="182" y="248" fill="#7d9fc4" font-family="ui-monospace, monospace" font-size="8" letter-spacing="1.2">DATE</text>
    <text x="182" y="268" fill="#f1ece1" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1">26.10</text>
  </g>
  <g>
    <rect x="324" y="236" width="150" height="40" fill="none" stroke="#7d9fc4" stroke-width="1" stroke-opacity="0.55"/>
    <text x="332" y="248" fill="#7d9fc4" font-family="ui-monospace, monospace" font-size="8" letter-spacing="1.2">SCALE</text>
    <text x="332" y="268" fill="#f1ece1" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1">1:1</text>
  </g>
  <g>
    <rect x="474" y="236" width="150" height="40" fill="none" stroke="#7d9fc4" stroke-width="1" stroke-opacity="0.55"/>
    <text x="482" y="248" fill="#7d9fc4" font-family="ui-monospace, monospace" font-size="8" letter-spacing="1.2">REV</text>
    <text x="482" y="268" fill="#f1ece1" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1">1.0</text>
  </g>
  <g>
    <rect x="624" y="236" width="152" height="40" fill="none" stroke="#7d9fc4" stroke-width="1" stroke-opacity="0.55"/>
    <text x="632" y="248" fill="#7d9fc4" font-family="ui-monospace, monospace" font-size="8" letter-spacing="1.2">SHEET</text>
    <text x="632" y="268" fill="#f1ece1" font-family="ui-monospace, monospace" font-size="11" letter-spacing="1">01 / 05</text>
  </g>
</svg>