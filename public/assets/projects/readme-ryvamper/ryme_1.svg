  <g class="ln0" transform="translate(40 74)"><text fill="#4ade80">$</text><text x="20" fill="#e7e7ea">./identity --reveal</text></g>
  <g class="ln2" transform="translate(60 118)"><text fill="#5a5a64">[</text><text x="6" fill="#4ade80">→</text><text x="20" fill="#5a5a64">]</text><text x="40" fill="#5a5a64">name</text><text x="160" fill="#e7e7ea">Ryan Polasky</text></g>
  <g class="ln3" transform="translate(60 140)"><text fill="#5a5a64">[</text><text x="6" fill="#4ade80">→</text><text x="20" fill="#5a5a64">]</text><text x="40" fill="#5a5a64">role</text><text x="160" fill="#e7e7ea">Software Engineer</text></g>
  <g class="ln4" transform="translate(60 162)"><text fill="#5a5a64">[</text><text x="6" fill="#4ade80">→</text><text x="20" fill="#5a5a64">]</text><text x="40" fill="#5a5a64">org</text><text x="160" fill="#e7e7ea">UT Dallas &apos;26</text></g>
  <g class="ln5" transform="translate(60 184)"><text fill="#5a5a64">[</text><text x="6" fill="#4ade80">→</text><text x="20" fill="#5a5a64">]</text><text x="40" fill="#5a5a64">location</text><text x="160" fill="#e7e7ea">Dallas, TX</text></g>
  <g class="ln6" transform="translate(60 206)"><text fill="#5a5a64">[</text><text x="6" fill="#4ade80">→</text><text x="20" fill="#5a5a64">]</text><text x="40" fill="#5a5a64">tagline</text><text x="160" fill="#e7e7ea">LLMs, iOS, infra. Recovering Java enjoyer.</text></g>
