<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" viewBox="0 0 800 300">
  <style>
    .name { animation: nameIn 12s ease-out infinite; }
    .underline { animation: underlineDraw 12s ease-out infinite; transform-origin: left center; }
    .meta { animation: fadeUp 12s ease-out infinite; animation-delay: 0.3s; }
    .corner { animation: cornerSlide 12s ease-out infinite; }

    @keyframes nameIn {
      0%, 4% { opacity: 0; transform: translateY(8px); }
      14%, 90% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes underlineDraw {
      0%, 14% { transform: scaleX(0); }
      24%, 88% { transform: scaleX(1); }
      100% { transform: scaleX(1); }
    }
    @keyframes fadeUp {
      0%, 22% { opacity: 0; transform: translateY(6px); }
      32%, 90% { opacity: 1; transform: translateY(0); }
      100% { opacity: 0; transform: translateY(0); }
    }
    @keyframes cornerSlide {
      0%, 8% { opacity: 0; transform: translateX(-8px); }
      18%, 90% { opacity: 1; transform: translateX(0); }
      100% { opacity: 0; transform: translateX(0); }
    }
  </style>
  <defs>
    <linearGradient id="hdr-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0d10"/>
      <stop offset="100%" stop-color="#0d0d10" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="url(#hdr-bg)" rx="14" ry="14"/>

  <!-- Corner decorations: outer <g> = position, inner <g> = animation -->
  <g class="corner" opacity="0.6">
    <rect x="40" y="42" width="22" height="2" fill="#dc2626" />
    <rect x="40" y="42" width="2" height="22" fill="#dc2626" />
  </g>
  <g transform="translate(800 0) scale(-1 1)">
    <g class="corner" opacity="0.6">
      <rect x="40" y="42" width="22" height="2" fill="#dc2626" />
      <rect x="40" y="42" width="2" height="22" fill="#dc2626" />
    </g>
  </g>

  <!-- Name -->
  <text class="name" x="400" y="138" text-anchor="middle" fill="#f7f7fb" font-family='"Inter", system-ui, sans-serif' font-size="56" font-weight="700" letter-spacing="-1.5">Ryan Polasky</text>

  <!-- Accent underline -->
  <rect class="underline" x="232" y="164" width="336" height="2" fill="#dc2626" rx="1"/>

  <!-- Meta line -->
  <text class="meta" x="400" y="200" text-anchor="middle" fill="#a5a5b3" font-family="ui-monospace, monospace" font-size="13" letter-spacing="2">SOFTWARE ENGINEER   ·   UT DALLAS &apos;26   ·   DALLAS, TX</text>
</svg>